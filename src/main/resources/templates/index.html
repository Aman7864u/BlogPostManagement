<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Blog Posts</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f7f5f2;
        --surface: #ffffff;
        --ink: #1a1814;
        --ink-muted: #6b6660;
        --accent: #c0392b;
        --accent-light: #fdf0ef;
        --border: #e8e4df;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.04);
        --radius: 10px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        padding: 48px 24px;
      }

      .page-wrapper {
        max-width: 860px;
        margin: 0 auto;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Header ── */
      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 36px;
        padding-bottom: 28px;
        border-bottom: 1.5px solid var(--border);
      }

      .header-left .eyebrow {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 6px;
      }

      .header-left h1 {
        font-family: "Lora", serif;
        font-size: 2rem;
        font-weight: 600;
        line-height: 1.2;
        color: var(--ink);
      }

      .btn-new {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-size: 13.5px;
        font-weight: 500;
        padding: 10px 20px;
        border-radius: 6px;
        transition:
          background 0.18s,
          transform 0.15s,
          box-shadow 0.18s;
        box-shadow: 0 2px 8px rgba(192, 57, 43, 0.22);
        white-space: nowrap;
      }
      .btn-new:hover {
        background: #a93226;
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(192, 57, 43, 0.28);
      }
      .btn-new svg {
        flex-shrink: 0;
      }

      /* ── Table card ── */
      .card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        border: 1px solid var(--border);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead tr {
        background: #faf9f7;
        border-bottom: 1.5px solid var(--border);
      }

      thead th {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--ink-muted);
        padding: 14px 22px;
        text-align: left;
      }

      thead th:last-child {
        text-align: right;
      }

      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #faf9f7;
      }

      tbody td {
        padding: 16px 22px;
        font-size: 14.5px;
        vertical-align: middle;
      }

      .post-title {
        font-weight: 500;
        color: var(--ink);
      }

      .post-author {
        color: var(--ink-muted);
        font-size: 13.5px;
      }

      /* ── Action links ── */
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn-action {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        text-decoration: none;
        font-size: 12.5px;
        font-weight: 500;
        padding: 6px 13px;
        border-radius: 5px;
        transition:
          background 0.15s,
          color 0.15s;
      }

      .btn-edit {
        background: #eef3ff;
        color: #3251d4;
      }
      .btn-edit:hover {
        background: #dce6ff;
      }

      .btn-delete {
        background: var(--accent-light);
        color: var(--accent);
      }
      .btn-delete:hover {
        background: #fbe0de;
      }

      /* ── Empty state ── */
      .empty {
        text-align: center;
        padding: 56px 24px;
        color: var(--ink-muted);
      }
      .empty p {
        font-size: 14px;
        margin-top: 8px;
      }

      /* ── Footer count ── */
      .table-footer {
        padding: 13px 22px;
        font-size: 12.5px;
        color: var(--ink-muted);
        background: #faf9f7;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Header -->
      <div class="page-header">
        <div class="header-left">
          <p class="eyebrow">Content Management</p>
          <h1>All Blog Posts</h1>
        </div>
        <a th:href="@{/new}" class="btn-new">
          <svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M7 1v12M1 7h12"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
          New Post
        </a>
      </div>

      <!-- Table Card -->
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Author</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Thymeleaf loop -->
            <tr th:each="post : ${listPosts}">
              <td class="post-title" th:text="${post.title}"></td>
              <td class="post-author" th:text="${post.author}"></td>
              <td>
                <div class="actions">
                  <a
                    class="btn-action btn-edit"
                    th:href="@{'/edit/' + ${post.id}}"
                  >
                    <svg
                      width="12"
                      height="12"
                      viewBox="0 0 12 12"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M8.5 1.5l2 2-6 6H2.5v-2l6-6z"
                        stroke="currentColor"
                        stroke-width="1.3"
                        stroke-linejoin="round"
                      />
                    </svg>
                    Edit
                  </a>
                  <a
                    class="btn-action btn-delete"
                    th:href="@{'/delete/' + ${post.id}}"
                  >
                    <svg
                      width="12"
                      height="12"
                      viewBox="0 0 12 12"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M2 3h8M5 3V2h2v1M4.5 9.5v-5M7.5 9.5v-5M3 3l.5 7h5L9 3"
                        stroke="currentColor"
                        stroke-width="1.3"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                    Delete
                  </a>
                </div>
              </td>
            </tr>

            <!-- Empty state (shown when no posts) -->
            <tr th:if="${#lists.isEmpty(listPosts)}">
              <td colspan="3">
                <div class="empty">
                  <svg
                    width="36"
                    height="36"
                    viewBox="0 0 36 36"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <rect
                      x="6"
                      y="4"
                      width="24"
                      height="28"
                      rx="3"
                      stroke="#ccc"
                      stroke-width="1.5"
                    />
                    <path
                      d="M12 12h12M12 17h12M12 22h7"
                      stroke="#ccc"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    />
                  </svg>
                  <p>
                    No blog posts yet.
                    <a th:href="@{/new}" style="color: var(--accent)"
                      >Create your first one →</a
                    >
                  </p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Row count footer -->
        <div class="table-footer" th:unless="${#lists.isEmpty(listPosts)}">
          <span th:text="${#lists.size(listPosts)} + ' post(s) total'"></span>
        </div>
      </div>
    </div>
  </body>
</html>
